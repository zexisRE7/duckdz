name: Build Dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build .dylib
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build Tweak
        run: |
          export THEOS_PACKAGE_SCHEME=rootless
          make FINALPACKAGE=1 DEBUG=0 -j$(sysctl -n hw.logicalcpu)
          mkdir -p output
          find .theos/obj -name "*.dylib" -exec cp {} output/ \;

      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffz-dylib
          path: output/*.dylib
          if-no-files-found: error


name: Build FFZ Tweak (OB53)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build .deb with Theos
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Restore JRMemory.framework binary from GitHub Secret ────────────────
      # Secret name: JRMEMORY_B64
      # How to create the secret (run locally once):
      #   base64 -i JRMemory.framework/JRMemory -o jrmemory.b64
      #   cat jrmemory.b64   → copy the output → add as GitHub Secret JRMEMORY_B64
      - name: Restore JRMemory framework binary
        env:
          JRMEMORY_B64: ${{ secrets.JRMEMORY_B64 }}
        run: |
          mkdir -p JRMemory.framework/Headers
          echo "$JRMEMORY_B64" | base64 --decode > JRMemory.framework/JRMemory
          chmod +x JRMemory.framework/JRMemory

      # ── Restore libdobby.a from secret (optional) ────────────────────────────
      - name: Restore libdobby
        if: ${{ secrets.LIBDOBBY_B64 != '' }}
        env:
          LIBDOBBY_B64: ${{ secrets.LIBDOBBY_B64 }}
        run: |
          echo "$LIBDOBBY_B64" | base64 --decode > libdobby.a

      # ── Restore Keystone arm64 lib ────────────────────────────────────────────
      - name: Restore Keystone arm64
        if: ${{ secrets.KEYSTONE_B64 != '' }}
        env:
          KEYSTONE_B64: ${{ secrets.KEYSTONE_B64 }}
        run: |
          mkdir -p KittyMemory/Deps/Keystone/libs-ios/arm64
          echo "$KEYSTONE_B64" | base64 --decode > \
            KittyMemory/Deps/Keystone/libs-ios/arm64/libkeystone.a

      # ── Setup Theos ───────────────────────────────────────────────────────────
      - name: Setup Theos
        uses: theos/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build tweak
        run: |
          export THEOS_PACKAGE_SCHEME=rootless
          make package FINALPACKAGE=1 DEBUG=0 -j$(sysctl -n hw.logicalcpu)

      # ── Upload .deb ────────────────────────────────────────────────────────────
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffz-tweak-deb
          path: packages/*.deb
          if-no-files-found: error
          retention-days: 7
